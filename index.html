<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>克隆语音实验一</title>
    <style>
        body {
            font-family: "Microsoft YaHei", sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
            user-select: none;
        }

        #app {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 600px;
        }

        h1 { color: #333; }
        p { line-height: 1.6; color: #555; font-size: 16px; }

        .btn {
            background-color: #007BFF;
            color: white;
            border: none;
            padding: 10px 20px;
            margin: 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.3s;
        }
        .btn:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }
        .btn:hover:not(:disabled) {
            background-color: #0056b3;
        }

        .speaker-icon {
            font-size: 40px;
            cursor: pointer;
            margin: 0 20px;
            color: #555;
        }
        .speaker-icon:hover {
            color: #007BFF;
        }

        #feedback {
            margin-top: 20px;
            font-weight: bold;
            color: #28a745;
            height: 24px;
            font-size: 14px;
        }

        .audio-container {
            display: flex;
            justify-content: space-around;
            align-items: center;
            margin: 30px 0;
            background: #f9f9f9;
            padding: 20px;
            border-radius: 8px;
        }
        
        .status-badge {
            display: inline-block;
            padding: 6px 16px;
            border-radius: 24px;
            font-size: 14px;
            font-weight: 500;
            margin-top: 10px;
            transition: all 0.2s;
        }
        
        .status-wait {
            background-color: #e9ecef;
            color: #6c757d;
        }
        
        .status-ready {
            background-color: #28a745;
            color: white;
        }
        
        .guidance-text {
            font-size: 14px;
            color: #555;
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- 界面内容将由JS动态生成 -->
    </div>

<script>
    // ================= 数据部分 =================
    // 严格对应表格中的36行数据
    const trials = [
        { left: "other/low-ideal (5).wav", right: "self/low-ideal (4).wav" },
        { left: "self/high-true (10).wav", right: "self/low-true (1).wav" },
        { left: "other/high-true (12).wav", right: "self/low-true (3).wav" },
        { left: "self/low-true (2).wav", right: "self/high-true (11).wav" },
        { left: "other/high-true (2).wav", right: "other/high-true (4).wav" },
        { left: "self/high-true (16).wav", right: "other/high-true (18).wav" },
        { left: "other/low-ideal (6).wav", right: "self/low-ideal (5).wav" },
        { left: "other/low-true (2).wav", right: "self/high-true (11).wav" },
        { left: "other/low-true (4).wav", right: "self/low-true (5).wav" },
        { left: "self/high-ideal (3).wav", right: "self/high-true (9).wav" },
        { left: "self/high-ideal (2).wav", right: "self/high-true (8).wav" },
        { left: "other/high-ideal (4).wav", right: "self/high-ideal (5).wav" },
        { left: "other/high-true (5).wav", right: "other/high-true (6).wav" },
        { left: "other/high-ideal (2).wav", right: "other/high-true (8).wav" },
        { left: "self/high-ideal (6).wav", right: "other/high-ideal (5).wav" },
        { left: "other/high-true (1).wav", right: "other/high-true (2).wav" },
        { left: "other/high-true (15).wav", right: "other/low-ideal (1).wav" },
        { left: "other/high-ideal (3).wav", right: "other/high-true (9).wav" },
        { left: "self/high-true (12).wav", right: "self/low-true (3).wav" },
        { left: "self/high-true (17).wav", right: "other/high-true (16).wav" },
        { left: "self/high-true (13).wav", right: "self/low-ideal (3).wav" },
        { left: "self/low-ideal (6).wav", right: "other/low-ideal (4).wav" },
        { left: "other/high-true (10).wav", right: "other/low-true (1).wav" },
        { left: "self/low-ideal (2).wav", right: "self/high-true (14).wav" },
        { left: "other/high-ideal (6).wav", right: "self/high-ideal (4).wav" },
        { left: "other/low-true (6).wav", right: "self/low-true (4).wav" },
        { left: "self/high-true (1).wav", right: "self/high-true (3).wav" },
        { left: "self/high-true (18).wav", right: "self/high-true (18).wav" },
        { left: "self/high-true (7).wav", right: "self/high-ideal (1).wav" },
        { left: "self/low-true (6).wav", right: "other/low-true (5).wav" },
        { left: "other/low-ideal (2).wav", right: "other/high-true (14).wav" },
        { left: "self/high-true (3).wav", right: "self/high-true (4).wav" },
        { left: "self/high-true (15).wav", right: "self/low-ideal (1).wav" },
        { left: "self/high-true (5).wav", right: "other/high-true (8).wav" },
        { left: "other/high-true (13).wav", right: "other/low-ideal (3).wav" },
        { left: "other/high-true (7).wav", right: "other/high-ideal (1).wav" }
    ];

    // ================= 全局变量 =================
    let currentTrialIndex = 0;
    let results = [];
    let audioCache = {};
    let currentTrialState = null;
    let audioEndedHandlers = new Map();

    const app = document.getElementById('app');

    // ================= 初始化 =================
    window.onload = function() {
        const savedData = localStorage.getItem('exp1_results');
        const savedIndex = localStorage.getItem('exp1_currentIndex');
        if (savedData && savedIndex) {
            if(confirm("检测到未完成的实验数据，是否从中断处继续？\n点击“取消”将重新开始。")) {
                results = JSON.parse(savedData);
                currentTrialIndex = parseInt(savedIndex);
            }
        }
        showWelcomeScreen();
    };

    function showWelcomeScreen() {
        app.innerHTML = `
            <h1>克隆语音实验一</h1>
            <p>接下来，您将依次听到若干对语音片段。<br>
               您的任务是判断每一对中的两段语音是否来自同一个人。<br><br>
               <strong>操作指南：</strong><br>
               1. 点击两侧的 🔊 图标播放声音。<br>
               2. 请务必<strong>听完两个音频</strong>（点击两个喇叭），并等待最后一段音频<strong>播放结束</strong>。<br>
               3. 若认为来自<strong>同一人</strong>，请按 <strong>F</strong> 键。<br>
               4. 若认为<strong>不是</strong>，请按 <strong>J</strong> 键。<br><br>
               </p>
            <button id="startBtn" class="btn" disabled>正在加载音频资源... (0/36)</button>
        `;
        const startBtn = document.getElementById('startBtn');
        preloadAudio((progress) => {
            startBtn.innerText = `正在加载音频资源... (${progress}/36)`;
        }).then(() => {
            startBtn.disabled = false;
            startBtn.innerText = "加载完成，按空格键或点击开始";
            startBtn.focus();
        });
        startBtn.onclick = startExperiment;
        document.addEventListener('keydown', handleWelcomeKey);
    }

    function handleWelcomeKey(e) {
        if (e.code === 'Space') {
            e.preventDefault();
            const btn = document.getElementById('startBtn');
            if (btn && !btn.disabled) startExperiment();
        }
    }

    function preloadAudio(onProgress) {
        let loadedCount = 0;
        const allPaths = new Set();
        trials.forEach(t => {
            allPaths.add(t.left);
            allPaths.add(t.right);
        });
        const total = allPaths.size;
        const promises = [];
        allPaths.forEach(path => {
            const p = new Promise((resolve) => {
                const audio = new Audio();
                audio.src = encodeURI(path);
                audio.oncanplaythrough = () => {
                    loadedCount++;
                    onProgress(loadedCount);
                    resolve();
                };
                audio.onerror = () => {
                    console.warn(`音频加载失败: ${path}`);
                    loadedCount++;
                    onProgress(loadedCount);
                    resolve();
                };
                audio.load();
                audioCache[path] = audio;
            });
            promises.push(p);
        });
        return Promise.all(promises);
    }

    function startExperiment() {
        document.removeEventListener('keydown', handleWelcomeKey);
        document.addEventListener('keydown', handleGlobalKey);
        renderTrial();
    }

    function handleGlobalKey(e) {
        if (e.code === 'KeyF' || e.code === 'KeyJ') {
            handleResponse(e.code === 'KeyF' ? 'F' : 'J');
        }
    }

    function cleanupCurrentTrialAudioListeners() {
        if (!currentTrialState) return;
        if (currentTrialState.playedAudiosSet) {
            currentTrialState.playedAudiosSet.forEach(path => {
                const audio = audioCache[path];
                if (audio && audioEndedHandlers.has(audio)) {
                    const handler = audioEndedHandlers.get(audio);
                    audio.removeEventListener('ended', handler);
                    audioEndedHandlers.delete(audio);
                }
            });
        }
    }

    function renderTrial() {
        if (currentTrialIndex >= trials.length) {
            endExperiment();
            return;
        }

        cleanupCurrentTrialAudioListeners();

        const trial = trials[currentTrialIndex];
        currentTrialState = {
            trialIndex: currentTrialIndex,
            leftPath: trial.left,
            rightPath: trial.right,
            playedAudiosSet: new Set(),
            playOrder: [],
            lastPlayedPath: null,
            responseEnabled: false,
            responseStartTime: 0,
            alreadyEnabledForThisTrial: false,
            bothPlayedFlag: false
        };

        app.innerHTML = `
            <p>试次 ${currentTrialIndex + 1} / ${trials.length}</p>
            <div class="audio-container">
                <div>
                    <div class="speaker-icon" data-audio="left">🔊</div>
                    <p>语音 A</p>
                </div>
                <div style="font-size: 24px; color: #999;">VS</div>
                <div>
                    <div class="speaker-icon" data-audio="right">🔊</div>
                    <p>语音 B</p>
                </div>
            </div>
            <div class="guidance-text" id="guidanceText">🔊 点击喇叭播放音频</div>
            <div id="statusIndicator" class="status-badge status-wait">⏳ 请听完两个音频</div>
            <div id="feedback"></div>
        `;

        const leftIcon = document.querySelector('[data-audio="left"]');
        const rightIcon = document.querySelector('[data-audio="right"]');
        if (leftIcon) leftIcon.onclick = () => playAudioWithTracking(trial.left);
        if (rightIcon) rightIcon.onclick = () => playAudioWithTracking(trial.right);
        
        updateStatusUI(false);
    }

    function updateStatusUI(enabled) {
        const statusDiv = document.getElementById('statusIndicator');
        const guidanceSpan = document.getElementById('guidanceText');
        if (!statusDiv) return;
        if (enabled) {
            statusDiv.className = "status-badge status-ready";
            statusDiv.innerHTML = "✅ 可以按键";
            if (guidanceSpan) guidanceSpan.innerHTML = "请按 F (同一人) 或 J (不同人)";
        } else {
            statusDiv.className = "status-badge status-wait";
            statusDiv.innerHTML = "⏳ 请听完两个音频";
            if (guidanceSpan) guidanceSpan.innerHTML = "🔊 点击喇叭播放音频";
        }
    }

    function playAudioWithTracking(path) {
        if (!currentTrialState) return;
        
        const audio = audioCache[path];
        if (!audio) {
            console.error("音频未缓存:", path);
            const fallbackAudio = new Audio(encodeURI(path));
            fallbackAudio.play().catch(e => alert("音频文件缺失: " + path));
            return;
        }
        
        // 如果已经可以按键，再点击喇叭则重置响应状态（因为最后播放的音频变了）
        // 如果已经可以按键，再点击喇叭则重置响应状态（因为最后播放的音频变了）
if (currentTrialState.responseEnabled === true) {
    currentTrialState.responseEnabled = false;
    currentTrialState.alreadyEnabledForThisTrial = false;
    
    // 👇 新增：重置计时起点
    currentTrialState.responseStartTime = 0; 
    
    // 👇 新增：清空已播放记录（这是解决你问题的核心）
    currentTrialState.playedAudiosSet.clear(); 
    
    // 👇 新增：重置播放顺序
    currentTrialState.playOrder = []; 

    updateStatusUI(false);
    const fb = document.getElementById('feedback');
    if (fb) fb.innerHTML = "重新播放，请等待音频结束";
}
        
        if (!audio.paused) {
            audio.pause();
            audio.currentTime = 0;
        }
        
        currentTrialState.playOrder.push(path);
        currentTrialState.lastPlayedPath = path;
        currentTrialState.playedAudiosSet.add(path);
        
        const { leftPath, rightPath } = currentTrialState;
        const hasLeft = currentTrialState.playedAudiosSet.has(leftPath);
        const hasRight = currentTrialState.playedAudiosSet.has(rightPath);
        currentTrialState.bothPlayedFlag = (hasLeft && hasRight);
        
        if (audioEndedHandlers.has(audio)) {
            const oldHandler = audioEndedHandlers.get(audio);
            audio.removeEventListener('ended', oldHandler);
            audioEndedHandlers.delete(audio);
        }
        
        const endedHandler = () => {
            if (!currentTrialState) return;
            if (currentTrialState.responseEnabled === true) return;
            
            const isLastPlayed = (currentTrialState.lastPlayedPath === path);
            if (!isLastPlayed) return;
            
            const hasLeftNow = currentTrialState.playedAudiosSet.has(leftPath);
            const hasRightNow = currentTrialState.playedAudiosSet.has(rightPath);
            
            if (hasLeftNow && hasRightNow) {
                currentTrialState.responseStartTime = Date.now();
                currentTrialState.responseEnabled = true;
                currentTrialState.alreadyEnabledForThisTrial = true;
                updateStatusUI(true);
                const fb = document.getElementById('feedback');
                if (fb) fb.innerHTML = "✓ 可以按键";
            } else {
                const fb = document.getElementById('feedback');
                if (fb) fb.innerHTML = "请继续播放另一个音频";
                updateStatusUI(false);
            }
        };
        
        audioEndedHandlers.set(audio, endedHandler);
        audio.addEventListener('ended', endedHandler);
        
        audio.currentTime = 0;
        audio.play().catch(err => {
            console.error("播放失败:", path, err);
            const fb = document.getElementById('feedback');
            if (fb) fb.innerHTML = "播放失败，请重试";
        });
        
        if (currentTrialState.bothPlayedFlag && !currentTrialState.responseEnabled) {
            const fb = document.getElementById('feedback');
            if (fb) fb.innerHTML = "等待最后一段音频结束...";
        }
    }

    function handleResponse(key) {
        if (!currentTrialState || !currentTrialState.responseEnabled) {
            const fb = document.getElementById('feedback');
            if (fb) {
                if (!currentTrialState?.bothPlayedFlag) {
                    fb.innerHTML = "请先播放两个音频";
                } else {
                    fb.innerHTML = "请等待音频播放结束";
                }
            }
            const statusDiv = document.getElementById('statusIndicator');
            if (statusDiv) {
                statusDiv.style.transform = "scale(1.02)";
                setTimeout(() => { if(statusDiv) statusDiv.style.transform = ""; }, 200);
            }
            return;
        }
        
        const reactionTime = Date.now() - currentTrialState.responseStartTime;
        const trial = trials[currentTrialIndex];
        
        results.push({
            trial: currentTrialIndex + 1,
            audioA: trial.left,
            audioB: trial.right,
            response: key,
            rt: reactionTime,
            note: "计时起点=最后音频结束时刻"
        });
        
        localStorage.setItem('exp1_results', JSON.stringify(results));
        localStorage.setItem('exp1_currentIndex', currentTrialIndex);
        
        const feedbackEl = document.getElementById('feedback');
        if (feedbackEl) feedbackEl.innerText = `已记录 (${reactionTime}ms)`;
        
        document.removeEventListener('keydown', handleGlobalKey);
        
        setTimeout(() => {
            cleanupCurrentTrialAudioListeners();
            currentTrialIndex++;
            document.addEventListener('keydown', handleGlobalKey);
            renderTrial();
        }, 800);
    }
    
    function endExperiment() {
        if (currentTrialState) cleanupCurrentTrialAudioListeners();
        app.innerHTML = `
            <h1>实验结束</h1>
            <p>感谢您的参与！</p>
            <button class="btn" onclick="downloadCSV()">下载数据 (CSV)</button>
        `;
        document.removeEventListener('keydown', handleGlobalKey);
        localStorage.clear();
    }

    function downloadCSV() {
        let csvContent = "data:text/csv;charset=utf-8,\uFEFF";
        csvContent += "试次,音频A路径,音频B路径,按键反应,反应时(ms),备注\n";
        results.forEach(row => {
            csvContent += `${row.trial},"${row.audioA}","${row.audioB}",${row.response},${row.rt},${row.note || ""}\n`;
        });
        const encodedUri = encodeURI(csvContent);
        const link = document.createElement("a");
        link.setAttribute("href", encodedUri);
        link.setAttribute("download", "实验1_语音匹配数据.csv");
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }
    
    // 兼容旧调用
    window.playAudio = function(path) {
        if (currentTrialState) playAudioWithTracking(path);
    };
</script>
</body>
</html>
